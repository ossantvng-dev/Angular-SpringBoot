<div class="container">
  <h2>Catálogo de productos App</h2>
  <app-catalog 
    [products]="products" 
    (add)="onAddProductToCart($event)">
  </app-catalog>

  @if (items.length > 0) {
    <app-cart 
      [items]="items" 
      (remove)="onRemoveItemFromCart($event)">
    </app-cart>
  } @else {
    <div class="alert alert-warning">No hay elementos en el carro !</div>
  }
</div>
