<app-navbar [items]="items" (showOrHideCartEventEmitter)="showOrHideCart()"></app-navbar>
<div class="container my-4">
  <h2>Catálogo de productos App</h2>
  <app-catalog [products]="products" (add)="onAddProductToCart($event)"></app-catalog>
</div>
@if (showModal) {
  <app-cart-modal (close)="showOrHideCart()"></app-cart-modal>
}
