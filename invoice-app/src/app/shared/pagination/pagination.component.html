<div class="d-flex justify-content-between align-items-center mt-3">
  <!-- Rows per page -->
  <div class="d-flex align-items-center gap-2">
    <label class="mb-0">Rows per page:</label>

    <select
      class="form-select form-select-sm"
      style="width: auto"
      [value]="itemsPerPage"
      (change)="changeItemsPerPage($any($event.target).value)"
    >
      @for (opt of itemsPerPageOptions; track opt) {
        <option [value]="opt">{{ opt }}</option>
      }
    </select>
  </div>

  <!-- Page indicator -->
  <span>Página {{ currentPage }} de {{ totalPages }}</span>

  <!-- Pagination buttons -->
  <div class="d-flex gap-2">
    <button class="btn btn-outline-primary btn-sm" (click)="prev()" [disabled]="currentPage === 1">
      Anterior
    </button>

    <button
      class="btn btn-outline-primary btn-sm"
      (click)="next()"
      [disabled]="currentPage === totalPages"
    >
      Siguiente
    </button>
  </div>
</div>
