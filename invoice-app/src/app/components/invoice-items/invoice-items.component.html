<div class="d-flex justify-content-between align-items-center mt-3">
  <h5 class="mb-0">Detalle de la factura</h5>
  <button
    class="btn btn-primary d-flex align-items-center gap-2"
    (click)="showAddItem = !showAddItem"
  >
    @if (!showAddItem) {
      <i class="bi bi-plus-circle"></i> Agregar item
    } @else {
      <i class="bi bi-x-circle"></i> Cancelar
    }
  </button>
</div>

@if (showAddItem) {
  <app-invoice-add-item (addItem)="addItem($event)"></app-invoice-add-item>
}

<table class="table table-striped table-hover mt-2">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Producto</th>
      <th class="text-end">Precio</th>
      <th class="text-end">Cantidad</th>
      <th class="text-end">Total línea</th>
      <th class="text-center"></th>
    </tr>
  </thead>

  <tbody>
    @for (item of invoice.items; track $index; let i = $index) {
      <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.product }}</td>

        <td class="text-end">
          {{ item.price | currency: 'USD' }}
        </td>

        <td class="text-end">
          {{ item.quantity }}
        </td>

        <!-- Total por línea -->
        <td class="text-end fw-bold">
          {{ item.price * item.quantity | currency: 'USD' }}
        </td>

        <!-- Botón eliminar con icono -->
        <td class="text-center">
          <button class="btn btn-outline-danger btn-sm" (click)="remove(i)" title="Eliminar línea">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    }
  </tbody>
</table>
