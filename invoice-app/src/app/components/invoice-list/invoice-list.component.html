<div class="container my-4">
  <h2 class="mb-4">Listado de Facturas</h2>

  <div class="accordion" id="invoiceAccordion">
    @for (invoice of paginatedInvoices; track invoice.id; let i = $index) {
      <div class="accordion-item mb-3">
        <!-- HEADER AZUL (igual al original) -->
        <h2 class="accordion-header" id="heading-{{ i }}">
          <button
            class="accordion-button collapsed p-0"
            type="button"
            data-bs-toggle="collapse"
            [attr.data-bs-target]="'#collapse-' + i"
            aria-expanded="false"
            aria-controls="collapse-{{ i }}"
            style="background: none; border: none"
          >
            <div class="w-100 bg-primary text-white p-3">
              <h4 class="mb-0">{{ invoice.name }} (ID: {{ invoice.id }})</h4>
            </div>
          </button>
        </h2>

        <!-- CONTENIDO EXPANDIBLE -->
        <div
          id="collapse-{{ i }}"
          class="accordion-collapse collapse"
          aria-labelledby="heading-{{ i }}"
        >
          <div class="accordion-body p-0">
            <app-invoice-card [invoice]="invoice"></app-invoice-card>
          </div>
        </div>
      </div>
    }
  </div>
  <app-pagination
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    [itemsPerPage]="itemsPerPage"
    [itemsPerPageOptions]="[5, 10, 20, 50]"
    (pageChange)="changePage($event)"
    (itemsPerPageChange)="changeItemsPerPage($event)"
  >
  </app-pagination>
</div>
